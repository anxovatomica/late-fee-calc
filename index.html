<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator — Late Fee Calculator</title>
<style>
:root{--brand:#0070f3;--bg:#fafafa;--card:#fff;--text:#111;--muted:#666;--border:#e5e5e5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:40px 20px}
.container{max-width:720px;margin:0 auto}
.card{background:var(--card);border-radius:16px;padding:40px;box-shadow:0 2px 20px rgba(0,0,0,.06)}
h1{font-size:2rem;margin-bottom:8px}
.subtitle{color:var(--muted);margin-bottom:32px}
.form-group{margin-bottom:20px}
label{display:block;font-weight:600;margin-bottom:6px;font-size:.9rem;text-transform:uppercase;letter-spacing:.02em;color:var(--muted)}
input,select{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:8px;font-size:1rem;transition:border-color .15s}
input:focus,select:focus{outline:none;border-color:var(--brand)}
.btn{width:100%;padding:14px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:1.1rem;font-weight:600;cursor:pointer;margin-top:12px}
.btn:hover{opacity:.9}
.result{margin-top:32px;padding:24px;background:#f0f9ff;border-radius:12px;border-left:4px solid var(--brand);display:none}
.result.active{display:block}
.result h2{font-size:1.5rem;margin-bottom:12px}
.result-value{font-size:2.5rem;font-weight:800;color:var(--brand)}
.email-capture{margin-top:32px;padding:20px;background:#f9fafb;border-radius:12px}
.email-capture p{font-size:.9rem;color:var(--muted);margin-bottom:12px}
footer{text-align:center;margin-top:60px;color:var(--muted);font-size:.875rem}
</style>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3N4GH5M7QF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-3N4GH5M7QF');
</script>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>Calculator</h1>
    <p class="subtitle">Calculate late payment fees instantly</p>
    <form id="calcForm">
      <div class="form-group">
        <label>Input Value</label>
        <input type="number" id="inputVal" placeholder="Enter value..." step="any">
      </div>
      <div class="form-group">
        <label>Rate / Percentage (%)</label>
        <input type="number" id="rate" placeholder="e.g. 12.5" step="any">
      </div>
      <button type="submit" class="btn">Calculate</button>
    </form>
    <div class="result" id="resultBox">
      <h2>Result</h2>
      <div class="result-value" id="resultValue">—</div>
      <p id="resultDetail"></p>
    </div>
    <div class="email-capture">
      <p>💡 Want to save this calculation? Enter your email:</p>
      <div style="display:flex;gap:8px">
        <input type="email" id="email" placeholder="your@email.com" style="flex:1">
        <button class="btn" style="width:auto;padding:12px 24px;margin-top:0" onclick="saveEmail()">Save</button>
      </div>
    </div>
  </div>
</div>
<footer>© 2026 Late Fee Calculator. Free tool powered by SiteForge.</footer>
<script>
document.getElementById('calcForm').addEventListener('submit',function(e){
  e.preventDefault();
  const val=parseFloat(document.getElementById('inputVal').value)||0;
  const rate=parseFloat(document.getElementById('rate').value)||0;
  const result=val*(rate/100);
  document.getElementById('resultValue').textContent=result.toFixed(2)+' ';
  document.getElementById('resultDetail').textContent=`${val} × ${rate}% = ${result.toFixed(2)}`;
  document.getElementById('resultBox').classList.add('active');
});
function saveEmail(){
  const email=document.getElementById('email').value;
  if(!email.includes('@')){alert('Enter a valid email');return;}
  let emails=JSON.parse(localStorage.getItem('sf_emails')||'[]');
  emails.push({email:email,date:new Date().toISOString()});
  localStorage.setItem('sf_emails',JSON.stringify(emails));
  alert('Saved! We will send you updates.');
}
</script>
</body>
</html>
